name: Profane Standards (Guild Gatekeeper)

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  quality:
    name: 🛡️ Quality Gate
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      
      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          
      - name: Install Dependencies
        run: npm install
        
      - name: Lint
        continue-on-error: true
        run: npm run lint --if-present

      - name: Test
        run: npm test --if-present

  security:
    name: 🔒 Security Audit
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Audit
        run: npm audit --audit-level=critical

  build:
    name: 🏗️ Production Build
    needs: [quality, security]
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v6
        with:
          node-version: '20'
      - name: Install
        run: npm install
      - name: Build
        run: npm run build --if-present
